<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="조건부확률과 통계적 의사결정 학습지를 보조하는 웹앱 모음입니다." />
  <title>통계적 의사결정 도우미</title>
  <link rel="stylesheet" href="../../assets/common.css" />
  <style>
    .page {
      max-width: 1120px;
    }

    .hero {
      margin-bottom: 24px;
    }

    .lab-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      align-items: stretch;
    }

    .lab-card {
      display: grid;
      align-content: start;
      gap: 12px;
      min-height: 230px;
      padding: 22px;
      border: 1px solid #dbe4ef;
      border-radius: 8px;
      background: #ffffff;
      color: inherit;
      text-decoration: none;
      box-shadow: 0 8px 22px rgba(15, 23, 42, 0.07);
    }

    a.lab-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 30px rgba(15, 23, 42, 0.11);
    }

    .lab-card h2 {
      margin: 0;
      color: #111827;
      font-size: 28px;
      line-height: 1.2;
    }

    .lab-card p {
      margin: 0;
      font-size: 17px;
      line-height: 1.55;
    }

    .card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: auto;
    }

    .meta-pill {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 5px 9px;
      border-radius: 999px;
      background: #eff6ff;
      color: #1d4ed8;
      font-size: 13px;
      font-weight: 850;
    }

    .meta-pill.ready {
      background: #ecfdf5;
      color: #047857;
    }

    .meta-pill.pending {
      background: #f3f4f6;
      color: #6b7280;
    }

    @media (max-width: 820px) {
      .page {
        padding: 36px 16px;
      }

      .lab-grid {
        grid-template-columns: 1fr;
      }

      .lab-card {
        min-height: 0;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <a class="back-link" href="../">← 확률과 통계</a>

    <header class="hero">
      <p class="eyebrow">Probability & Statistics · Decision Support</p>
      <h1>통계적 의사결정 도우미</h1>
      <p>학습지 흐름을 유지하면서 조건부확률의 분모, 자연빈도, 간단한 계산을 확인하는 보조 웹앱을 모아 둡니다.</p>
    </header>

    <section class="lab-grid" aria-label="통계적 의사결정 웹앱 목록">
      <a class="lab-card" href="./sensor-alarm/">
        <h2>04 센서 경보</h2>
        <p>센서 경보 상황에서 자연빈도 그림, 2×2 빈도표, 분모 강조, 입력형 계산 확인을 사용합니다.</p>
        <div class="card-meta" aria-label="센서 경보 상태">
          <span class="meta-pill ready">사용 가능</span>
          <span class="meta-pill">학생용 PDF 포함</span>
        </div>
      </a>

      <article class="lab-card">
        <h2>01 상품추천</h2>
        <p>상품추천 규칙 상황의 조건부확률 도구는 같은 구조의 후속 preset으로 준비합니다.</p>
        <div class="card-meta" aria-label="상품추천 상태">
          <span class="meta-pill pending">준비 중</span>
        </div>
      </article>
    </section>
  </main>
</body>
</html>
