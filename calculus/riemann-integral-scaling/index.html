<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="구분구적법에서 구간 분할, 직사각형 폭, 표본점 선택이 정적분 근사에 주는 영향을 시각화하는 미적분 웹앱입니다." />
  <title>구분구적법과 정적분</title>
  <!-- MathJax: 분수, 합, 극한, 정적분 기호 렌더링. CDN 사용으로 인터넷 연결 필요. -->
  <script>
    MathJax = {
      tex: { inlineMath: [['\\(', '\\)']], displayMath: [['\\[', '\\]']] },
      options: { skipHtmlTags: ['script','noscript','style','textarea','pre'] }
    };
  </script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
  <link rel="stylesheet" href="../../assets/common.css" />
  <style>
    :root {
      --bg: #f6f8fb;
      --panel: #ffffff;
      --ink: #17202a;
      --muted: #5d6d7e;
      --line: #d8e0ea;
      --blue: #2563eb;
      --teal: #0f766e;
      --coral: #e76f51;
      --amber: #d97706;
      --shadow: 0 6px 20px rgba(23,32,42,0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", system-ui, sans-serif;
      background: var(--bg);
      color: var(--ink);
      font-size: 16px;
    }
    .wrap {
      width: min(1280px, calc(100% - 24px));
      margin: 0 auto;
      padding: 24px 0 48px;
    }
    a.back-link {
      display: inline-block;
      margin-bottom: 16px;
      color: var(--blue);
      font-weight: 800;
      text-decoration: none;
      font-size: 15px;
    }
    .hero { margin-bottom: 20px; }
    .hero h1 { margin: 0 0 6px; font-size: clamp(24px,3.5vw,38px); }
    .hero p { margin: 0; color: var(--muted); font-size: 15px; max-width: 780px; line-height: 1.6; }

    /* ── Mode tabs ── */
    .mode-tabs {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .mode-tab {
      padding: 8px 18px;
      border-radius: 8px;
      border: 2px solid var(--line);
      background: var(--panel);
      font: 700 14px inherit;
      cursor: pointer;
      color: var(--muted);
      transition: background .15s, color .15s, border-color .15s;
    }
    .mode-tab.active-A { background: var(--blue); color: #fff; border-color: var(--blue); }
    .mode-tab.active-B { background: var(--teal); color: #fff; border-color: var(--teal); }
    .mode-tab.active-C { background: var(--coral); color: #fff; border-color: var(--coral); }

    /* ── Layout ── */
    .app-layout {
      display: grid;
      grid-template-columns: minmax(0,1fr) 320px;
      gap: 16px;
      align-items: start;
    }
    @media (max-width: 820px) {
      .app-layout { grid-template-columns: 1fr; }
    }

    /* ── Panel card ── */
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 10px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .card-head {
      padding: 10px 14px;
      border-bottom: 1px solid var(--line);
      font-size: 13px;
      font-weight: 800;
      color: var(--muted);
      background: #f9fafb;
    }
    .card-body { padding: 14px; }

    /* ── Controls ── */
    .ctrl-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .ctrl-label {
      display: grid;
      gap: 5px;
      font-size: 13px;
      font-weight: 800;
      color: var(--muted);
    }
    .ctrl-label.full { grid-column: 1 / -1; }
    select, button {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      color: var(--ink);
      font: inherit;
      width: 100%;
      padding: 0 10px;
    }
    button { cursor: pointer; font-weight: 700; }
    button.primary { background: var(--blue); color: #fff; border-color: var(--blue); }
    button.danger  { background: var(--coral); color: #fff; border-color: var(--coral); }

    .seg-buttons { display: flex; gap: 4px; }
    .seg-buttons button { flex: 1; padding: 0; font-size: 13px; min-height: 34px; }
    .seg-buttons button.active { background: var(--ink); color: #fff; border-color: var(--ink); }

    input[type="range"] { width: 100%; accent-color: var(--blue); }

    .slider-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 6px;
      align-items: center;
    }
    .slider-val {
      font-size: 18px;
      font-weight: 900;
      min-width: 36px;
      text-align: right;
    }

    .btn-row { display: flex; gap: 6px; margin-top: 6px; }
    .btn-row button { flex: 1; font-size: 13px; }

    /* ── Canvas ── */
    canvas { display: block; width: 100%; height: 440px; }
    .canvas-wrap { position: relative; }

    /* ── Metrics strip ── */
    .metrics {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      padding: 12px 14px;
      border-top: 1px solid var(--line);
      background: #f9fafb;
    }
    @media (max-width: 600px) {
      .metrics { grid-template-columns: repeat(2, 1fr); }
    }
    .metric { display: grid; gap: 2px; }
    .metric .m-label { font-size: 11px; font-weight: 800; color: var(--muted); }
    .metric .m-val   { font-size: 17px; font-weight: 900; }
    .metric .m-note  { font-size: 11px; color: var(--muted); }

    /* ── Info panels ── */
    .info-box {
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.7;
    }
    .info-box.mode-A { background: #eff6ff; border: 1px solid #bfdbfe; }
    .info-box.mode-B { background: #f0fdf4; border: 1px solid #bbf7d0; }
    .info-box.mode-C { background: #fff7ed; border: 1px solid #fed7aa; }

    /* ── Formula steps ── */
    .step-list { display: grid; gap: 8px; }
    .step-item {
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fafbfc;
      font-size: 15px;
      opacity: 0;
      max-height: 0;
      overflow: hidden;
      transition: opacity .3s, max-height .3s;
    }
    .step-item.visible {
      opacity: 1;
      max-height: 320px;
    }
    .step-item.highlight { background: #eff6ff; border-color: #93c5fd; }
    .step-btn-row { display: flex; gap: 6px; margin-top: 10px; }
    .step-btn-row button { flex: 1; font-size: 13px; }

    /* ── Rectangle info ── */
    .rect-info { font-size: 14px; line-height: 2; }
    .rect-info strong { color: var(--blue); }

    /* ── Comparison note ── */
    .compare-note {
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--amber);
      background: #fffbeb;
      font-size: 13px;
      line-height: 1.6;
      color: #92400e;
      margin-top: 8px;
    }
  </style>
</head>
<body>
<div class="wrap">
  <a class="back-link" href="../">← 미적분 웹앱</a>

  <div class="hero">
    <h1>구분구적법과 정적분</h1>
    <p>구간을 어떻게 나누는지, 표본점과 폭을 어떻게 쓰는지에 따라 합의 모양이 달라집니다.
       같은 넓이를 다른 문자로 표현하는 경우와, 실제로 다른 구간을 나누는 경우를 비교합니다.</p>
  </div>

  <!-- Mode selector: 레이블은 updateModeTabs()에서 동적으로 채움 -->
  <div class="mode-tabs">
    <button class="mode-tab" id="tab-A" onclick="setMode('A')"></button>
    <button class="mode-tab" id="tab-B" onclick="setMode('B')"></button>
    <button class="mode-tab" id="tab-C" onclick="setMode('C')">[0,1]을 x로 분할 (비교)</button>
  </div>

  <div class="app-layout">
    <!-- Left: graph + metrics -->
    <div>
      <div class="card">
        <div class="canvas-wrap">
          <canvas id="graph" height="440"></canvas>
        </div>
        <div class="metrics">
          <div class="metric">
            <div class="m-label">리만 합 Sₙ</div>
            <div class="m-val" id="m-sn">—</div>
          </div>
          <div class="metric">
            <div class="m-label" id="m-exact-label">정적분 값</div>
            <div class="m-val" id="m-exact">—</div>
          </div>
          <div class="metric">
            <div class="m-label" id="m-err-label">오차 |Sₙ − 정적분|</div>
            <div class="m-val" id="m-err">—</div>
          </div>
          <div class="metric">
            <div class="m-label">Δx</div>
            <div class="m-val" id="m-dx">—</div>
            <div class="m-note" id="m-dx-note"></div>
          </div>
        </div>
      </div>

      <!-- Formula steps -->
      <div class="card" style="margin-top:14px">
        <div class="card-head">수식 변환 단계</div>
        <div class="card-body">
          <div class="step-list" id="step-list"></div>
          <div class="step-btn-row">
            <button onclick="prevStep()">◀ 이전</button>
            <button class="primary" onclick="nextStep()">다음 단계 ▶</button>
            <button onclick="showAllSteps()">전체 보기</button>
          </div>
        </div>
      </div>

      <!-- Interpretation -->
      <div class="card" style="margin-top:14px">
        <div class="card-head">해석</div>
        <div class="card-body">
          <div id="interpret-box"></div>
        </div>
      </div>
    </div>

    <!-- Right: controls + rect info -->
    <div style="display:grid;gap:14px">
      <!-- Controls -->
      <div class="card">
        <div class="card-head">조작 패널</div>
        <div class="card-body">
          <div class="ctrl-grid">
            <label class="ctrl-label">
              함수
              <select id="sel-func" onchange="onCtrl()">
                <option value="x2">f(x) = x²</option>
                <option value="x">f(x) = x</option>
                <option value="x2h">f(x) = 1 + 0.5x²</option>
              </select>
            </label>
            <label class="ctrl-label">
              구간
              <select id="sel-interval" onchange="onCtrl()">
                <option value="0,1">[0, 1]</option>
                <option value="0,3" selected>[0, 3]</option>
                <option value="1,4">[1, 4]</option>
              </select>
            </label>

            <div class="ctrl-label full">
              분할 개수 n
              <div class="slider-row">
                <input type="range" id="sl-n" min="1" max="80" value="6" oninput="onCtrl()">
                <span class="slider-val" id="disp-n">6</span>
              </div>
              <div class="btn-row">
                <button onclick="adjustN(-1)">n−</button>
                <button onclick="adjustN(1)">n+</button>
                <button onclick="setN(50)">n=50</button>
              </div>
            </div>

            <div class="ctrl-label full">
              표본점 방식
              <div class="seg-buttons" id="seg-sample">
                <button onclick="setSample('left')">왼쪽 끝점</button>
                <button onclick="setSample('right')">오른쪽 끝점</button>
                <button onclick="setSample('mid')">중점</button>
              </div>
            </div>

            <div class="ctrl-label full">
              강조할 직사각형 k
              <div class="slider-row">
                <input type="range" id="sl-k" min="1" max="6" value="4" oninput="onKChange()">
                <span class="slider-val" id="disp-k">4</span>
              </div>
            </div>

            <div class="ctrl-label full" style="margin-top:4px">
              <button class="danger" onclick="resetAll()">초기화</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Rectangle info -->
      <div class="card">
        <div class="card-head">k번째 직사각형 정보</div>
        <div class="card-body">
          <div class="rect-info" id="rect-info">—</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ─── State ──────────────────────────────────────────────────────────────────
const state = {
  func: 'x2',
  a: 0, b: 3,
  n: 6,
  sample: 'right',
  mode: 'A',
  k: 4,
  step: 1
};

// ─── Math helpers ────────────────────────────────────────────────────────────
function getFunctionValue(x) {
  switch (state.func) {
    case 'x2':  return x * x;
    case 'x':   return x;
    case 'x2h': return 1 + 0.5 * x * x;
  }
}

function getExactIntegral(a, b) {
  switch (state.func) {
    case 'x2':  return (b*b*b - a*a*a) / 3;
    case 'x':   return (b*b - a*a) / 2;
    case 'x2h': return (b - a) + (b*b*b - a*a*a) / 6;
  }
}

function getDeltaX() {
  const { a, b, n, mode } = state;
  if (mode === 'C') return 1 / n;
  return (b - a) / n;
}

// Returns the actual x-coordinate on the graph for the k-th sample point (1-indexed)
function getSamplePoint(k) {
  const { a, b, n, sample, mode } = state;
  if (mode === 'C') {
    // [0,1] split
    const dt = 1 / n;
    if (sample === 'right') return k / n;
    if (sample === 'left')  return (k - 1) / n;
    return (k - 0.5) / n;
  }
  // modes A and B: same actual x positions
  const dx = (b - a) / n;
  if (sample === 'right') return a + k * dx;
  if (sample === 'left')  return a + (k - 1) * dx;
  return a + (k - 0.5) * dx;
}

function computeRiemannSum() {
  const dx = getDeltaX();
  let sum = 0;
  for (let k = 1; k <= state.n; k++) {
    sum += getFunctionValue(getSamplePoint(k)) * dx;
  }
  return sum;
}

function getIntegralForMode() {
  if (state.mode === 'C') return getExactIntegral(0, 1);
  return getExactIntegral(state.a, state.b);
}

// ─── Canvas drawing ──────────────────────────────────────────────────────────
const canvas = document.getElementById('graph');
const ctx = canvas.getContext('2d');

function drawGraph() {
  const { a, b, n, k, mode, func } = state;
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.clientWidth;
  const H = 440; // CSS height 고정값 — clientHeight를 쓰면 DPR 재설정 루프 발생
  canvas.width  = Math.round(W * dpr);
  canvas.height = Math.round(H * dpr);
  ctx.scale(dpr, dpr);

  const PAD_L = 54, PAD_R = 20, PAD_T = 20, PAD_B = 44;
  const plotW = W - PAD_L - PAD_R;
  const plotH = H - PAD_T - PAD_B;

  // Determine x range to display
  let xMin, xMax;
  if (mode === 'C') {
    // [0,1] + [a,b] 모두 보이도록
    const rightEdge = Math.max(b, 1);
    xMin = Math.min(a, 0) - 0.15;
    xMax = rightEdge + rightEdge * 0.15;
  } else {
    xMin = a - 0.15 * (b - a); xMax = b + 0.15 * (b - a);
  }

  // Determine y range: max of f on [xMin,xMax]
  let yMax = 0;
  const steps = 200;
  for (let i = 0; i <= steps; i++) {
    const x = xMin + (xMax - xMin) * i / steps;
    if (x >= 0) yMax = Math.max(yMax, getFunctionValue(x));
  }
  yMax = yMax * 1.18 || 1;
  const yMin = -yMax * 0.08;

  function toCanvasX(x) { return PAD_L + (x - xMin) / (xMax - xMin) * plotW; }
  function toCanvasY(y) { return PAD_T + plotH - (y - yMin) / (yMax - yMin) * plotH; }

  ctx.clearRect(0, 0, W, H);

  // Shaded area under curve
  ctx.save();
  const areaA = (mode === 'C') ? 0 : a;
  const areaB = (mode === 'C') ? 1 : b;

  // C 모드에서 [a,b] 전체 영역을 옅은 주황으로 먼저 표시 (비교용)
  if (mode === 'C' && (a !== 0 || b !== 1)) {
    ctx.beginPath();
    ctx.moveTo(toCanvasX(a), toCanvasY(0));
    for (let i = 0; i <= 200; i++) {
      const x = a + (b - a) * i / 200;
      ctx.lineTo(toCanvasX(x), toCanvasY(getFunctionValue(x)));
    }
    ctx.lineTo(toCanvasX(b), toCanvasY(0));
    ctx.closePath();
    ctx.fillStyle = 'rgba(251,191,36,0.15)';
    ctx.fill();
    // 점선 테두리로 [a,b] 구분
    ctx.setLineDash([5, 4]);
    ctx.strokeStyle = 'rgba(217,119,6,0.5)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // 실제 적분 구간 (녹색)
  ctx.beginPath();
  ctx.moveTo(toCanvasX(areaA), toCanvasY(0));
  for (let i = 0; i <= 300; i++) {
    const x = areaA + (areaB - areaA) * i / 300;
    ctx.lineTo(toCanvasX(x), toCanvasY(getFunctionValue(x)));
  }
  ctx.lineTo(toCanvasX(areaB), toCanvasY(0));
  ctx.closePath();
  ctx.fillStyle = 'rgba(187,247,208,0.45)';
  ctx.fill();

  // Rectangles
  const dx = getDeltaX();
  for (let i = 1; i <= n; i++) {
    const xSample = getSamplePoint(i);
    const h = getFunctionValue(xSample);
    let rectLeft;
    if (mode === 'C') {
      rectLeft = (i - 1) / n;
    } else {
      rectLeft = a + (i - 1) * (b - a) / n;
    }
    const rectRight = rectLeft + dx;

    ctx.save();
    if (i === k) {
      ctx.fillStyle = 'rgba(37,99,235,0.55)';
      ctx.strokeStyle = '#1e40af';
      ctx.lineWidth = 2;
    } else {
      ctx.fillStyle = 'rgba(147,197,253,0.4)';
      ctx.strokeStyle = 'rgba(59,130,246,0.5)';
      ctx.lineWidth = 1;
    }
    const cx1 = toCanvasX(rectLeft);
    const cx2 = toCanvasX(rectRight);
    const cy0 = toCanvasY(0);
    const cyh = toCanvasY(h);
    ctx.fillRect(cx1, cyh, cx2 - cx1, cy0 - cyh);
    ctx.strokeRect(cx1, cyh, cx2 - cx1, cy0 - cyh);
    ctx.restore();

    // Sample point dot
    if (i === k) {
      ctx.beginPath();
      ctx.arc(toCanvasX(xSample), toCanvasY(h), 5, 0, 2 * Math.PI);
      ctx.fillStyle = '#1e40af';
      ctx.fill();
    }
  }

  // Curve
  ctx.beginPath();
  ctx.strokeStyle = '#0f766e';
  ctx.lineWidth = 2.5;
  for (let i = 0; i <= 400; i++) {
    const x = xMin + (xMax - xMin) * i / 400;
    const y = (x >= 0) ? getFunctionValue(x) : 0;
    if (i === 0) ctx.moveTo(toCanvasX(x), toCanvasY(y));
    else ctx.lineTo(toCanvasX(x), toCanvasY(y));
  }
  ctx.stroke();

  // Axes
  ctx.strokeStyle = '#64748b';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(PAD_L, PAD_T); ctx.lineTo(PAD_L, PAD_T + plotH);
  ctx.moveTo(PAD_L, toCanvasY(0)); ctx.lineTo(W - PAD_R, toCanvasY(0));
  ctx.stroke();

  // Axis labels
  ctx.fillStyle = '#374151';
  ctx.font = '12px "Malgun Gothic",system-ui,sans-serif';
  ctx.textAlign = 'center';

  // x-axis ticks
  const xTicks = computeXTicks(xMin, xMax);
  xTicks.forEach(xv => {
    const cx = toCanvasX(xv);
    ctx.beginPath(); ctx.moveTo(cx, toCanvasY(0)); ctx.lineTo(cx, toCanvasY(0) + 5); ctx.stroke();
    ctx.fillText(fmt(xv), cx, toCanvasY(0) + 17);
  });

  // y-axis ticks
  ctx.textAlign = 'right';
  const yTicks = computeYTicks(yMin, yMax);
  yTicks.forEach(yv => {
    const cy = toCanvasY(yv);
    ctx.beginPath(); ctx.moveTo(PAD_L, cy); ctx.lineTo(PAD_L - 5, cy); ctx.stroke();
    ctx.fillText(fmt(yv), PAD_L - 7, cy + 4);
  });

  // Δx indicator below axis for k-th rect
  const kSample = getSamplePoint(k);
  let kLeft = (mode === 'C') ? (k-1)/n : a + (k-1)*(b-a)/n;
  const kRight = kLeft + dx;
  const dxY = toCanvasY(0) + 28;
  ctx.strokeStyle = '#1e40af';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(toCanvasX(kLeft), dxY - 5); ctx.lineTo(toCanvasX(kLeft), dxY + 5);
  ctx.moveTo(toCanvasX(kLeft), dxY); ctx.lineTo(toCanvasX(kRight), dxY);
  ctx.moveTo(toCanvasX(kRight), dxY - 5); ctx.lineTo(toCanvasX(kRight), dxY + 5);
  ctx.stroke();
  ctx.fillStyle = '#1e40af';
  ctx.font = 'bold 12px "Malgun Gothic",system-ui,sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('Δx', (toCanvasX(kLeft)+toCanvasX(kRight))/2, dxY + 16);

  // a, b 끝점 레이블 (x축 아래)
  if (mode !== 'C') {
    const axisY = toCanvasY(0);
    ctx.save();
    ctx.font = 'bold 13px "Malgun Gothic",system-ui,sans-serif';
    ctx.textAlign = 'center';
    // a
    ctx.fillStyle = '#7c3aed';
    ctx.fillText('a=' + fmt(a), toCanvasX(a), axisY + 30);
    ctx.beginPath(); ctx.arc(toCanvasX(a), axisY, 4, 0, 2*Math.PI);
    ctx.fillStyle = '#7c3aed'; ctx.fill();
    // b
    ctx.fillStyle = '#b91c1c';
    ctx.fillText('b=' + fmt(b), toCanvasX(b), axisY + 30);
    ctx.beginPath(); ctx.arc(toCanvasX(b), axisY, 4, 0, 2*Math.PI);
    ctx.fillStyle = '#b91c1c'; ctx.fill();
    ctx.restore();
  } else {
    // C 모드: 0과 1 강조
    const axisY = toCanvasY(0);
    ctx.save();
    ctx.font = 'bold 13px "Malgun Gothic",system-ui,sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#e76f51';
    ctx.fillText('0', toCanvasX(0), axisY + 30);
    ctx.fillText('1', toCanvasX(1), axisY + 30);
    ctx.restore();
  }

  // f label
  ctx.fillStyle = '#0f766e';
  ctx.font = 'bold 13px "Malgun Gothic",system-ui,sans-serif';
  ctx.textAlign = 'left';
  const funcLabel = { x2:'y = x²', x:'y = x', x2h:'y = 1 + 0.5x²' }[state.func];
  ctx.fillText(funcLabel, PAD_L + 6, PAD_T + 16);

  // Mode label top-right
  const modeLabel = { A:'[a,b] 직접 분할', B:'t로 [a,b] 표현', C:'[0,1] x로 분할' }[mode];
  ctx.textAlign = 'right';
  ctx.fillStyle = mode === 'A' ? '#2563eb' : mode === 'B' ? '#0f766e' : '#e76f51';
  ctx.fillText('모드 ' + mode + ': ' + modeLabel, W - PAD_R - 4, PAD_T + 16);
}

function computeXTicks(xMin, xMax) {
  const span = xMax - xMin;
  const step = niceStep(span / 6);
  const ticks = [];
  let v = Math.ceil(xMin / step) * step;
  while (v <= xMax + 1e-9) { ticks.push(+v.toFixed(8)); v += step; }
  return ticks;
}
function computeYTicks(yMin, yMax) {
  const span = yMax - yMin;
  const step = niceStep(span / 5);
  const ticks = [];
  let v = Math.ceil(yMin / step) * step;
  while (v <= yMax + 1e-9) { ticks.push(+v.toFixed(8)); v += step; }
  return ticks.filter(v => v >= yMin - 1e-9);
}
function niceStep(raw) {
  const p = Math.pow(10, Math.floor(Math.log10(raw)));
  const f = raw / p;
  if (f < 1.5) return p;
  if (f < 3.5) return 2 * p;
  if (f < 7.5) return 5 * p;
  return 10 * p;
}
function fmt(v) {
  if (Math.abs(v) < 1e-9) return '0';
  if (Math.abs(v - Math.round(v)) < 1e-9) return String(Math.round(v));
  return v.toFixed(2).replace(/\.?0+$/, '');
}

function getSampleLabel() {
  return state.sample === 'right' ? '오른쪽 끝점' : state.sample === 'left' ? '왼쪽 끝점' : '중점';
}

function getSampleOffsetText(k) {
  if (state.sample === 'right') return String(k);
  if (state.sample === 'left') return String(k - 1);
  return `${k}−½`;
}

function getSampleTkHtml(k) {
  if (state.sample === 'right') return `${k}/${state.n}`;
  if (state.sample === 'left') return `${k - 1}/${state.n}`;
  return `(${k}−½)/${state.n}`;
}

function getSampleTkTex() {
  if (state.sample === 'right') return '\\dfrac{k}{n}';
  if (state.sample === 'left') return '\\dfrac{k-1}{n}';
  return '\\dfrac{2k-1}{2n}';
}

// ─── Metrics strip ───────────────────────────────────────────────────────────
function renderMetrics() {
  const sn = computeRiemannSum();
  const exact = getIntegralForMode();
  const dx = getDeltaX();
  const { a, b, n, mode } = state;

  document.getElementById('m-sn').textContent    = sn.toFixed(4);
  document.getElementById('m-exact').textContent = exact.toFixed(4);
  document.getElementById('m-err').textContent   = Math.abs(sn - exact).toFixed(4);
  document.getElementById('m-dx').textContent    = fmt(dx);
  document.getElementById('m-exact-label').textContent = mode === 'C' ? '정적분 값 ([0,1] 기준)' : '정적분 값';
  document.getElementById('m-err-label').textContent = mode === 'C' ? '오차 ([0,1] 기준)' : '오차 |Sₙ − 정적분|';

  const ba = b - a;
  let note = '';
  if (mode === 'A') note = `(b−a)/n = (${fmt(b)}−${fmt(a)})/${n}`;
  if (mode === 'B') note = `${fmt(ba)}·Δt = ${fmt(ba)}·(1/${n})`;
  if (mode === 'C') note = `1/n = 1/${n}`;
  document.getElementById('m-dx-note').textContent = note;
}

// ─── Rectangle info ───────────────────────────────────────────────────────────
function renderRectInfo() {
  const { a, b, n, k, sample, mode, func } = state;
  const dx = getDeltaX();
  const xSample = getSamplePoint(k);
  const h = getFunctionValue(xSample);
  const area = h * dx;

  let html = '';
  if (mode === 'A') {
    const ba = b - a;
    const xkExpr = sample === 'right'  ? `${fmt(a)} + ${k}·(${fmt(ba)}/${n}) = ${fmt(xSample)}`
                 : sample === 'left'   ? `${fmt(a)} + ${k-1}·(${fmt(ba)}/${n}) = ${fmt(xSample)}`
                 :                       `${fmt(a)} + (${k}−½)·(${fmt(ba)}/${n}) = ${fmt(xSample)}`;
    html = `<strong>k = ${k}</strong><br>
      Δx = (${fmt(b)}−${fmt(a)}) / ${n} = <strong>${fmt(dx)}</strong><br>
      x<sub>${k}</sub> = ${xkExpr}<br>
      높이 = f(${fmt(xSample)}) = <strong>${fmt(h)}</strong><br>
      작은 넓이 = ${fmt(h)} × ${fmt(dx)} = <strong>${fmt(area)}</strong>`;
  } else if (mode === 'B') {
    const ba = b - a;
    const tk = sample === 'right' ? k/n : sample === 'left' ? (k-1)/n : (k-0.5)/n;
    // a≠0이면 x_k = a + (b-a)·t_k, a=0이면 x_k = (b-a)·t_k
    const xkExprB = a === 0
      ? `${fmt(ba)}·t<sub>${k}</sub> = <strong>${fmt(xSample)}</strong>`
      : `${fmt(a)} + ${fmt(ba)}·t<sub>${k}</sub> = <strong>${fmt(xSample)}</strong>`;
    html = `<strong>k = ${k}</strong><br>
      Δt = 1/${n} = ${fmt(1/n)}<br>
      t<sub>${k}</sub> = ${fmt(tk)}<br>
      x<sub>${k}</sub> = ${xkExprB}<br>
      Δx = ${fmt(ba)}·Δt = <strong>${fmt(dx)}</strong><br>
      높이 = f(${fmt(xSample)}) = <strong>${fmt(h)}</strong><br>
      작은 넓이 = ${fmt(h)} × ${fmt(dx)} = <strong>${fmt(area)}</strong>`;
  } else {
    const xkExpr = getSampleTkHtml(k);
    html = `<strong>k = ${k}</strong><br>
      Δx = 1/${n} = ${fmt(dx)}<br>
      x<sub>${k}</sub> = ${xkExpr} = ${fmt(xSample)}<br>
      높이 = f(${fmt(xSample)}) = <strong>${fmt(h)}</strong><br>
      작은 넓이 = ${fmt(h)} × ${fmt(dx)} = <strong>${fmt(area)}</strong><br>
      <em>이 직사각형은 [0,1] 안에 있습니다.</em>`;
  }
  document.getElementById('rect-info').innerHTML = html;
}

// ─── Formula steps ────────────────────────────────────────────────────────────
function getStepsForMode() {
  const { a, b, func, mode, sample } = state;
  const ba = b - a;
  const funcName = { x2:'x^2', x:'x', x2h:'1+0.5x^2' }[func];

  // 표본점 방식에 따른 x_k LaTeX 표현
  function xkTex(offset) {
    // offset: 오른쪽=k, 왼쪽=(k-1), 중점=(k-1/2)
    const kStr = offset === 'right' ? 'k' : offset === 'left' ? '(k-1)' : '\\left(k-\\tfrac{1}{2}\\right)';
    if (a === 0) {
      return `\\frac{${fmt(ba)}\\,${kStr === 'k' ? 'k' : kStr}}{n}`;
    }
    return `${fmt(a)} + ${fmt(ba)}\\cdot\\frac{${kStr === 'k' ? 'k' : kStr}}{n}`;
  }
  // f(x_k) LaTeX
  function fAtXk(offset) {
    const inner = xkTex(offset);
    switch(func) {
      case 'x2':  return `\\left(${inner}\\right)^2`;
      case 'x':   return inner;
      case 'x2h': return `1+0.5\\left(${inner}\\right)^2`;
    }
  }
  // 표본점 방식에 맞는 x_k 표현
  const xkLabel = getSampleLabel();
  const xkLatex = sample === 'right'
    ? (a === 0 ? `x_k = k\\cdot\\Delta x = \\frac{${fmt(ba)}k}{n}` : `x_k = ${fmt(a)} + k\\cdot\\Delta x`)
    : sample === 'left'
    ? (a === 0 ? `x_k = (k-1)\\cdot\\Delta x = \\frac{${fmt(ba)}(k-1)}{n}` : `x_k = ${fmt(a)} + (k-1)\\cdot\\Delta x`)
    : (a === 0 ? `x_k = \\left(k-\\tfrac{1}{2}\\right)\\Delta x = \\frac{${fmt(ba)}(2k-1)}{2n}` : `x_k = ${fmt(a)} + \\left(k-\\tfrac{1}{2}\\right)\\Delta x`);

  if (mode === 'A') {
    const intVal = fmt(getExactIntegral(a, b));
    const steps = [
      { tex: `S_n = \\sum_{k=1}^{n} f(x_k)\\,\\Delta x`, label: '리만 합 정의' },
      { tex: `\\Delta x = \\frac{b-a}{n} = \\frac{${fmt(ba)}}{n}`, label: `폭 (구간 [${fmt(a)},${fmt(b)}])` },
      { tex: xkLatex, label: `표본점: ${xkLabel}` },
      { tex: `S_n = \\sum_{k=1}^{n} f\\!\\left(${xkTex(sample)}\\right)\\cdot\\frac{${fmt(ba)}}{n}`, label: 'x_k, Δx 대입' },
      { tex: `S_n = \\sum_{k=1}^{n} ${fAtXk(sample)} \\cdot \\frac{${fmt(ba)}}{n}`, label: `f(x)=${funcName} 대입` },
      { tex: `\\lim_{n\\to\\infty} S_n = \\int_{${fmt(a)}}^{${fmt(b)}} f(x)\\,dx = ${intVal}`, label: 'n→∞, 정적분으로 수렴', highlight: true }
    ];
    return steps;
  }

  if (mode === 'B') {
    const intVal = fmt(getExactIntegral(a, b));
    // t_k 표현
    const tkExpr = getSampleTkTex();
    // x_k = a + (b-a)·t_k
    const xkFromTk = a === 0
      ? `${fmt(ba)}\\,t_k = ${fmt(ba)}\\cdot ${tkExpr}`
      : `${fmt(a)} + ${fmt(ba)}\\,t_k = ${fmt(a)} + ${fmt(ba)}\\cdot ${tkExpr}`;
    // f(x_k) using t_k
    const fTkInner = a === 0 ? `${fmt(ba)}\\,t_k` : `${fmt(a)}+${fmt(ba)}\\,t_k`;
    return [
      { tex: `t_k = ${tkExpr},\\quad \\Delta t = \\frac{1}{n}`, label: `t ∈ [0,1] n등분 (${xkLabel})` },
      { tex: a === 0 ? `x = ${fmt(ba)}\\,t` : `x = ${fmt(a)} + ${fmt(ba)}\\,t`, label: 'x와 t의 관계' },
      { tex: `x_k = ${xkFromTk}`, label: 'k번째 x 위치' },
      { tex: `\\Delta x = ${fmt(ba)}\\,\\Delta t = \\frac{${fmt(ba)}}{n}`, label: '폭도 함께 변환 ← 핵심!', highlight: true },
      { tex: `S_n = \\sum_{k=1}^{n} f\\!(${fTkInner})\\cdot ${fmt(ba)}\\,\\Delta t`, label: 't로 쓴 합' },
      { tex: `\\lim_{n\\to\\infty} S_n = \\int_0^1 f\\!(${fTkInner})\\cdot ${fmt(ba)}\\,dt`, label: 't-정적분으로 수렴', highlight: true },
      { tex: `= \\int_{${fmt(a)}}^{${fmt(b)}} f(x)\\,dx = ${intVal}`, label: '원래 정적분과 동일', highlight: true }
    ];
  }

  // mode C
  const intVal01 = fmt(getExactIntegral(0, 1));
  const intValAB = fmt(getExactIntegral(a, b));
  const tkC = getSampleTkTex();
  const fC = func === 'x2' ? `\\left(${tkC}\\right)^2` : func === 'x' ? tkC : `1+0.5\\left(${tkC}\\right)^2`;
  const compareStep = (a === 0 && b === 1)
    ? { tex: `\\text{현재 선택 구간도 }[0,1]\\text{이므로 A/B와 같은 구간을 봅니다.}`, label: '비교 효과 없음' }
    : { tex: `\\text{비교: }\\int_{${fmt(a)}}^{${fmt(b)}} f(x)\\,dx = ${intValAB} \\neq ${intVal01}`, label: `[0,1] ≠ [${fmt(a)},${fmt(b)}]` };
  return [
    { tex: `x_k = ${tkC},\\quad \\Delta x = \\frac{1}{n}`, label: `[0,1] n등분 (${xkLabel})` },
    { tex: `S_n = \\sum_{k=1}^{n} ${fC}\\cdot\\frac{1}{n}`, label: `합 식 (${xkLabel} 기준)` },
    { tex: `\\lim_{n\\to\\infty} S_n = \\int_0^1 f(x)\\,dx = ${intVal01}`, label: '[0,1]의 정적분', highlight: true },
    compareStep
  ];
}

function renderSteps() {
  const steps = getStepsForMode();
  const list = document.getElementById('step-list');
  list.innerHTML = '';
  steps.forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 'step-item' + (s.highlight ? ' highlight' : '');
    div.id = `step-${i}`;
    div.innerHTML = `<span style="font-size:12px;color:var(--muted);font-weight:800">${i+1}단계 · ${s.label}</span><br>\\[${s.tex}\\]`;
    list.appendChild(div);
  });
  updateStepVisibility();
}

function updateStepVisibility() {
  const steps = getStepsForMode();
  steps.forEach((_, i) => {
    const el = document.getElementById(`step-${i}`);
    if (el) el.classList.toggle('visible', i < state.step);
  });
  if (window.MathJax && MathJax.typesetPromise) {
    MathJax.typesetPromise([document.getElementById('step-list')]);
  }
}

function nextStep() {
  const max = getStepsForMode().length;
  if (state.step < max) { state.step++; updateStepVisibility(); }
}
function prevStep() {
  if (state.step > 1) { state.step--; updateStepVisibility(); }
}
function showAllSteps() {
  state.step = getStepsForMode().length;
  updateStepVisibility();
}

// ─── Interpretation text ──────────────────────────────────────────────────────
function renderInterpret() {
  const { mode, a, b, n, sample } = state;
  const ba = b - a;
  const sampleLabel = getSampleLabel();
  const sampleOffset = sample === 'right' ? 'k' : sample === 'left' ? 'k−1' : 'k−½';
  const xRelation = a === 0 ? `x = ${fmt(ba)}t` : `x = ${fmt(a)} + ${fmt(ba)}t`;
  let cls, html;

  if (mode === 'A') {
    cls = 'mode-A';
    html = `<strong>모드 A: [${fmt(a)}, ${fmt(b)}] 직접 분할</strong><br>
      [${fmt(a)},${fmt(b)}] 전체를 n등분했으므로 작은 폭은 <strong>${fmt(ba)}/n</strong>입니다.
      ${sampleLabel}을 쓰면 x<sub>k</sub> = ${a === 0 ? `${fmt(ba)}(${sampleOffset})/n` : `${fmt(a)} + ${fmt(ba)}(${sampleOffset})/n`}입니다.
      n을 키울수록 S<sub>n</sub>이 ∫f(x)dx에 가까워집니다.`;
  } else if (mode === 'B') {
    cls = 'mode-B';
    html = `<strong>모드 B: t ∈ [0,1], ${xRelation}</strong><br>
      t는 0에서 1까지 움직이지만, 실제 x축 위치는 ${xRelation}입니다.
      그래서 폭도 <strong>Δx = ${fmt(ba)}Δt</strong>가 되어야 같은 넓이를 구합니다.
      모드 A와 직사각형·S<sub>n</sub> 값이 완전히 같습니다.`;
    if (Math.abs(ba - 1) < 1e-9) {
      html += `<div class="compare-note">현재 구간 길이가 1이라 Δx와 Δt가 같습니다. 구간을 [0,3]이나 [1,4]로 바꾸면 폭 스케일링이 더 뚜렷하게 보입니다.</div>`;
    } else {
      html += `<div class="compare-note">Δx를 Δt와 같다고 두면 실제 x축 폭이 빠집니다. 변수 변환 시 폭도 반드시 함께 바꿔야 합니다.</div>`;
    }
  } else {
    cls = 'mode-C';
    const tkHtml = sample === 'right' ? 'k/n' : sample === 'left' ? '(k−1)/n' : '(2k−1)/(2n)';
    html = `<strong>모드 C: x<sub>k</sub> = ${tkHtml}, Δx = 1/n</strong><br>
      x<sub>k</sub>와 Δx를 [0,1] 기준으로 두면 x축에서 실제로 <strong>[0,1]</strong>만 나눈 것입니다.`;
    if (a === 0 && b === 1) {
      html += ` 현재 선택 구간도 [0,1]이므로 A/B와 같은 구간을 보는 상태입니다.`;
      html += `<div class="compare-note">비교 효과를 보려면 구간을 [0,3] 또는 [1,4]로 바꾸세요.</div>`;
    } else {
      html += ` 이 식은 틀린 식이 아니라 [${fmt(a)},${fmt(b)}]가 아닌 [0,1]의 넓이를 구하는 올바른 식입니다.
        [${fmt(a)},${fmt(b)}]의 넓이를 구하려면 x<sub>k</sub> 또는 Δx에 구간 길이 ${fmt(ba)}이 반영되어야 합니다.`;
      html += `<div class="compare-note">[0,1] 넓이: ${fmt(getExactIntegral(0,1))} · [${fmt(a)},${fmt(b)}] 넓이: ${fmt(getExactIntegral(a,b))}</div>`;
    }
  }

  const box = document.getElementById('interpret-box');
  box.innerHTML = `<div class="info-box ${cls}">${html}</div>`;
}

// ─── UI updates ───────────────────────────────────────────────────────────────
function updateModeTabs() {
  const { a, b } = state;
  const ab = `[${fmt(a)},${fmt(b)}]`;
  document.getElementById('tab-A').textContent = `${ab} 직접 분할`;
  document.getElementById('tab-B').textContent = `[0,1]의 t로 ${ab} 표현`;
  ['A','B','C'].forEach(m => {
    const el = document.getElementById(`tab-${m}`);
    el.className = 'mode-tab' + (state.mode === m ? ` active-${m}` : '');
  });
}

function updateSampleButtons() {
  const btns = document.getElementById('seg-sample').querySelectorAll('button');
  const labels = ['left','right','mid'];
  btns.forEach((b, i) => b.classList.toggle('active', labels[i] === state.sample));
}

function clampK() {
  state.k = Math.min(state.k, state.n);
  state.k = Math.max(1, state.k);
}

// ─── Render ───────────────────────────────────────────────────────────────────
function render() {
  clampK();
  document.getElementById('sl-n').value = state.n;
  document.getElementById('disp-n').textContent = state.n;
  document.getElementById('sl-k').max = state.n;
  document.getElementById('sl-k').value = state.k;
  document.getElementById('disp-k').textContent = state.k;
  updateModeTabs();
  updateSampleButtons();
  drawGraph();
  renderMetrics();
  renderRectInfo();
  renderSteps();
  renderInterpret();
}

// ─── Event handlers ───────────────────────────────────────────────────────────
function onCtrl() {
  state.func = document.getElementById('sel-func').value;
  const iv = document.getElementById('sel-interval').value.split(',');
  state.a = parseFloat(iv[0]); state.b = parseFloat(iv[1]);
  state.n = parseInt(document.getElementById('sl-n').value);
  clampK();
  state.step = 1;
  render();
}

function onKChange() {
  state.k = parseInt(document.getElementById('sl-k').value);
  document.getElementById('disp-k').textContent = state.k;
  drawGraph();
  renderRectInfo();
}

function adjustN(delta) {
  state.n = Math.max(1, Math.min(80, state.n + delta));
  state.step = 1;
  render();
}

function setN(val) {
  state.n = val;
  state.step = 1;
  render();
}

function setSample(s) {
  state.sample = s;
  state.step = 1;
  render();
}

function setMode(m) {
  state.mode = m;
  state.step = 1;
  render();
}

function resetAll() {
  state.func = 'x2';
  state.a = 0; state.b = 3;
  state.n = 6;
  state.sample = 'right';
  state.mode = 'A';
  state.k = 4;
  state.step = 1;
  document.getElementById('sel-func').value = 'x2';
  document.getElementById('sel-interval').value = '0,3';
  render();
}

// ─── Resize observer ─────────────────────────────────────────────────────────
new ResizeObserver(() => drawGraph()).observe(canvas);

// ─── Init ─────────────────────────────────────────────────────────────────────
render();
</script>
