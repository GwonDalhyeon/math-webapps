<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>미적분 웹앱</title>
  <link rel="stylesheet" href="../assets/common.css" />

<body>
  <main class="page">
    <a class="back-link" href="../">← 전체 자료실</a>

    <header class="hero">
      <p class="eyebrow">Calculus</p>
      <h1>미적분 웹앱</h1>

    <section class="card-grid">
      <a class="card" href="./sequence-limit/">
        <h2>수열의 극한</h2>
        <p>항이 늘어날수록 수열이 어떤 값에 가까워지는지 시각화합니다.</p>

      <article class="card">
        <h2>급수</h2>

        <span class="status">준비 중</span>
      </article>

      <article class="card">
        <h2>정적분과 넓이</h2>
        <p>구간 분할을 늘리며 넓이 근사가 정적분으로 이어지는 과정을 봅니다.</p>
        <span class="status">준비 중</span>
