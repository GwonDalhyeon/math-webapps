<h2>3518 비공개</h2>
<p>책: 미적분의 힘 / 스티븐 스트로가츠</p>
<p>주제: 미분방정식을 이용한 HIV 바이러스 농도 변화와 치료 효과 분석</p>
<p>개념: 지수함수, 순간변화율, 미분방정식, 동적평형상태</p>

<p><b>
이 웹앱은 미분방정식을 이용하여 단백질 분해 효소를 투여할 때 HIV 바이러스 농도가 시간에 따라 어떻게 변화하는지 시뮬레이션하고,
미적분이 실제 의학 연구와 치료 전략에 어떻게 활용되는지 보여줍니다.
</b></p>

<canvas id="chart"></canvas>

<br>
시간 <input type="range" id="time" min="0" max="10" step="0.1" value="1">
초기값 <input type="number" id="init" value="100">
제거율 <input type="range" id="decay" min="0.1" max="1" step="0.1" value="0.6">
생성률 <input type="range" id="growth" min="0" max="1" step="0.1" value="0.2">
<label><input type="checkbox" id="compare"> 비교모드</label>

<br><br>
<button onclick="play()">재생</button>
<button onclick="pause()">일시정지</button>
<button onclick="reset()">초기화</button>

<p id="result"></p>

<script>
let t=1;
let timer=null;

const ctx=document.getElementById('chart').getContext('2d');

let chart=new Chart(ctx,{
type:'line',
data:{labels:[],datasets:[
{label:'치료 후',data:[],borderColor:'blue'},
{label:'접선',data:[],borderColor:'red'},
{label:'치료 전',data:[],borderColor:'gray',borderDash:[5,5]},
{label:'현재 점',data:[],borderColor:'black',showLine:false,pointRadius:5}
]}
});

function f(t,i,g,d){return i*Math.exp((g-d)*t);}

function update(){
let i=parseFloat(init.value);
let g=parseFloat(growth.value);
let d=parseFloat(decay.value);

let labels=[],data=[],before=[];

for(let x=0;x<=10;x+=0.5){
labels.push(x);
data.push(f(x,i,g,d));
before.push(f(x,i,g,0.2));
}

let y=f(t,i,g,d);
let slope=(g-d)*y;

let tangent=labels.map(x=>y+slope*(x-t));

chart.data.labels=labels;
chart.data.datasets[0].data=data;
chart.data.datasets[1].data=tangent;
chart.data.datasets[2].data=compare.checked?before:[];
chart.data.datasets[3].data=labels.map(x=>Math.abs(x-t)<0.01?y:null);

chart.update();

let msg="순간 변화율: "+slope.toFixed(2);

if(Math.abs(g-d)<0.01){
msg+=" → 생성률과 제거율이 같아 동적 평형 상태입니다.";
}

result.innerText=msg;
}

time.oninput=()=>{t=parseFloat(time.value);update();}
init.oninput=update;
growth.oninput=update;
decay.oninput=update;
compare.onchange=update;

function play(){
if(timer) return;
timer=setInterval(()=>{
t+=0.1;
if(t>10) t=0;
time.value=t;
update();
},100);
}

function pause(){
clearInterval(timer);
timer=null;
}

function reset(){
t=1;
time.value=1;
update();
}

update();
</script>

</body>
